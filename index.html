<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GymDash — Workout Tracker</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #282828;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --accent-dim2: rgba(232,255,71,0.06);
    --red: #ff4f4f;
    --red-dim: rgba(255,79,79,0.12);
    --blue: #4fa3ff;
    --blue-dim: rgba(79,163,255,0.12);
    --green: #4fff8f;
    --green-dim: rgba(79,255,143,0.12);
    --orange: #ff9f4f;
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; overflow: hidden; }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s; }
  .screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .screen.slide-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }

  /* ── HEADER ── */
  .header {
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .header-back {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: none; color: var(--text);
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 600; flex: 1; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .header-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(232,255,71,0.2); letter-spacing: 0.5px; flex-shrink: 0;
  }

  /* ── SCROLL BODY ── */
  .body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 20px); }

  /* ── HOME SCREEN ── */
  .home-hero {
    padding: calc(var(--safe-top) + 24px) 20px 20px;
    background: var(--bg);
  }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
  .home-title { font-size: 30px; font-weight: 700; line-height: 1.15; margin-bottom: 6px; }
  .home-sub { font-size: 14px; color: var(--text2); }
  .divider { height: 1px; background: var(--border); margin: 0; }

  /* Load from URL input */
  .url-section { padding: 20px; }
  .url-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
  .url-row { display: flex; gap: 8px; }
  .url-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 14px;
    color: var(--text); font-size: 14px; outline: none;
    -webkit-appearance: none;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--text3); }
  .btn-load {
    background: var(--accent); color: #000; border: none;
    border-radius: var(--radius-sm); padding: 12px 18px;
    font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-load:active { opacity: 0.8; transform: scale(0.97); }

  /* Workout cards */
  .section-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; padding: 0 20px; margin-bottom: 12px; }
  .cards { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .workout-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }
  .workout-card:active { background: var(--surface2); }
  .workout-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .workout-card.week1::before { background: var(--accent); }
  .workout-card.week2::before { background: var(--blue); }
  .workout-card.week3::before { background: var(--red); }
  .workout-card.upper::before { background: var(--orange); }
  .workout-card.total::before { background: var(--green); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-size: 16px; font-weight: 700; }
  .card-week { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; }
  .week1 .card-week { background: var(--accent-dim); color: var(--accent); }
  .week2 .card-week { background: var(--blue-dim); color: var(--blue); }
  .week3 .card-week { background: var(--red-dim); color: var(--red); }
  .upper .card-week { background: rgba(255,159,79,0.12); color: var(--orange); }
  .total .card-week { background: var(--green-dim); color: var(--green); }
  .card-meta { font-size: 13px; color: var(--text2); }
  .card-stats { display: flex; gap: 16px; margin-top: 10px; }
  .card-stat { font-size: 11px; color: var(--text3); }
  .card-stat span { color: var(--text2); font-weight: 600; }
  .card-arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 18px; }

  /* ── WORKOUT SCREEN ── */
  .workout-progress {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; flex-shrink: 0;
  }
  .progress-bar-bg { height: 3px; background: var(--surface3); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }

  /* Phase header */
  .phase-block { margin: 16px 16px 0; }
  .phase-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .phase-pill {
    font-size: 10px; font-weight: 800; letter-spacing: 1px;
    padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
    background: var(--surface3); color: var(--text2);
  }
  .phase-pill.active { background: var(--accent-dim); color: var(--accent); }
  .phase-name { font-size: 15px; font-weight: 700; }
  .phase-goal-text { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 2px solid var(--border2); }

  /* Exercise card */
  .ex-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
  }
  .ex-card.completed { border-color: rgba(79,255,143,0.2); }
  .ex-header {
    padding: 14px 16px 10px;
    display: flex; justify-content: space-between; align-items: flex-start;
    cursor: pointer;
  }
  .ex-name-row { flex: 1; }
  .ex-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .ex-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .ex-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
    letter-spacing: 0.5px;
  }
  .badge-drop { background: var(--red-dim); color: var(--red); }
  .badge-tip  { background: var(--blue-dim); color: var(--blue); }
  .badge-peak { background: rgba(255,159,79,0.12); color: var(--orange); }
  .badge-ss   { background: var(--blue-dim); color: var(--blue); }
  .ex-check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border2); background: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; margin-left: 10px; margin-top: 2px;
    transition: all 0.2s;
  }
  .ex-check.done { background: var(--green); border-color: var(--green); }
  .ex-check svg { display: none; }
  .ex-check.done svg { display: block; }

  /* Sets row */
  .sets-area { padding: 0 16px 14px; }
  .sets-header { display: flex; font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; padding: 0 4px; }
  .sets-header-set { width: 40px; }
  .sets-header-target { flex: 1; text-align: center; }
  .sets-header-weight { width: 90px; text-align: center; }
  .sets-header-done { width: 50px; text-align: center; }

  .set-row {
    display: flex; align-items: center; gap: 0;
    padding: 8px 4px; border-radius: var(--radius-sm);
    transition: background 0.15s;
  }
  .set-row.set-done { background: var(--green-dim); }
  .set-num {
    width: 40px; font-size: 12px; font-weight: 700; color: var(--text3);
  }
  .set-target { flex: 1; font-size: 13px; color: var(--text2); text-align: center; }
  .set-weight-input {
    width: 90px; text-align: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 6px;
    color: var(--text); font-size: 15px; font-weight: 700;
    outline: none; -webkit-appearance: none;
  }
  .set-weight-input:focus { border-color: var(--accent); background: var(--surface3); }
  .set-done-btn {
    width: 50px; display: flex; justify-content: flex-end;
  }
  .set-check-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid var(--border2); background: none;
    color: var(--text3); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .set-check-btn.done { background: var(--green); border-color: var(--green); color: #000; }

  /* Tip box */
  .tip-box {
    margin: 0 16px 16px; padding: 10px 14px;
    background: var(--blue-dim); border-left: 2px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 12px; color: var(--text2); line-height: 1.6;
  }
  .tip-box b { color: var(--blue); }

  /* Finisher */
  .finisher-block { margin: 0 16px 16px; }
  .finisher-opts { display: flex; gap: 10px; }
  .fin-opt {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .fin-opt.selected { border-color: var(--accent); background: var(--accent-dim2); }
  .fin-opt-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .fin-opt-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .fin-opt-detail { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* Cooldown */
  .cooldown-block { margin: 0 16px 16px; display: flex; gap: 10px; }
  .cool-card {
    flex: 1; background: var(--surface2); border-radius: var(--radius-sm);
    padding: 14px; border: 1px solid var(--border);
  }
  .cool-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .cool-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* Rest Timer */
  .rest-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; padding: 40px;
  }
  .rest-overlay.hidden { display: none; }
  .rest-label { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
  .rest-ring {
    width: 180px; height: 180px; position: relative; margin-bottom: 24px;
  }
  .rest-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .rest-ring circle { fill: none; stroke-width: 6; }
  .rest-ring .track { stroke: var(--surface3); }
  .rest-ring .fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .rest-time {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 800; letter-spacing: -2px; color: var(--accent);
  }
  .rest-next { font-size: 14px; color: var(--text2); margin-bottom: 32px; text-align: center; }
  .rest-skip {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); border-radius: 30px; padding: 14px 32px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .rest-skip:active { opacity: 0.7; }
  .rest-add { background: none; border: none; color: var(--text3); font-size: 13px; cursor: pointer; margin-top: 16px; }

  /* Complete screen */
  .complete-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 24px;
    text-align: center; flex: 1;
  }
  .complete-icon { font-size: 64px; margin-bottom: 20px; }
  .complete-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .complete-sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; line-height: 1.5; }
  .complete-stats { display: flex; gap: 16px; margin-bottom: 40px; width: 100%; }
  .complete-stat {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 10px; text-align: center;
  }
  .complete-stat-val { font-size: 24px; font-weight: 800; color: var(--accent); }
  .complete-stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .btn-primary {
    background: var(--accent); color: #000; border: none;
    border-radius: 30px; padding: 16px 40px;
    font-size: 16px; font-weight: 800; cursor: pointer; width: 100%;
    margin-bottom: 12px;
  }
  .btn-secondary {
    background: none; border: 1px solid var(--border2); color: var(--text);
    border-radius: 30px; padding: 14px 40px;
    font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
  }

  /* Error toast */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 20px; right: 20px;
    background: var(--red); color: #fff; border-radius: var(--radius-sm);
    padding: 14px 16px; font-size: 14px; font-weight: 600;
    z-index: 200; transform: translateY(80px); transition: transform 0.3s;
    text-align: center;
  }
  .toast.show { transform: translateY(0); }

  .loading-state { padding: 60px 20px; text-align: center; color: var(--text2); font-size: 15px; }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .phase-sep { height: 1px; background: var(--border); margin: 8px 16px 20px; }
</style>
</head>
<body>

<!-- ══════════════ HOME SCREEN ══════════════ -->
<div class="screen" id="screen-home">
  <div class="body">
    <div class="home-hero">
      <div class="logo">GYMDASH</div>
      <div class="home-title">Your Workouts,<br>In Your Pocket.</div>
      <div class="home-sub">Track sets, rest, and weight — session by session.</div>
    </div>

    <div class="url-section">
      <div class="url-label">Load from GitHub / URL</div>
      <div class="url-row">
        <input class="url-input" id="url-input" type="url" placeholder="https://raw.githubusercontent.com/..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn-load" onclick="loadFromUrl()">Load</button>
      </div>
    </div>

    <div class="divider"></div>

    <div style="padding: 20px 0 0;">
      <div class="section-label">3-Month Build Plan — Lower Body</div>
      <div class="cards" id="builtin-cards"></div>

      <div class="section-label" style="margin-top:8px;">Other Workouts</div>
      <div class="cards" id="other-cards"></div>
    </div>
  </div>
</div>

<!-- ══════════════ WORKOUT SCREEN ══════════════ -->
<div class="screen hidden" id="screen-workout">
  <div class="header" id="workout-header">
    <button class="header-back" onclick="goHome()">‹</button>
    <div style="flex:1">
      <div class="header-title" id="workout-header-title">—</div>
      <div class="header-sub" id="workout-header-sub">—</div>
    </div>
    <div class="header-badge" id="workout-header-badge">60 MIN</div>
  </div>
  <div class="workout-progress">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-labels">
      <span id="progress-label-left">0 sets done</span>
      <span id="progress-label-right">0 remaining</span>
    </div>
  </div>
  <div class="body" id="workout-body"></div>
</div>

<!-- ══════════════ COMPLETE SCREEN ══════════════ -->
<div class="screen hidden" id="screen-complete">
  <div class="header">
    <button class="header-back" onclick="goHome()">‹</button>
    <div style="flex:1"><div class="header-title">Session Complete</div></div>
  </div>
  <div class="body">
    <div class="complete-screen">
      <div class="complete-icon">💪</div>
      <div class="complete-title" id="complete-title">Done!</div>
      <div class="complete-sub" id="complete-sub"></div>
      <div class="complete-stats" id="complete-stats"></div>
      <button class="btn-primary" onclick="goHome()">Back to Workouts</button>
      <button class="btn-secondary" onclick="restartWorkout()">Repeat Session</button>
    </div>
  </div>
</div>

<!-- ══════════════ REST TIMER ══════════════ -->
<div class="rest-overlay hidden" id="rest-overlay">
  <div class="rest-label">Rest Timer</div>
  <div class="rest-ring">
    <svg viewBox="0 0 180 180">
      <circle class="track" cx="90" cy="90" r="84"/>
      <circle class="fill" id="rest-ring-fill" cx="90" cy="90" r="84"
        stroke-dasharray="528" stroke-dashoffset="0"/>
    </svg>
    <div class="rest-time" id="rest-time">—</div>
  </div>
  <div class="rest-next" id="rest-next"></div>
  <button class="rest-skip" onclick="skipRest()">Skip Rest</button>
  <button class="rest-add" onclick="addRestTime(30)">+ 30 sec</button>
</div>

<!-- ══════════════ TOAST ══════════════ -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// WORKOUT DATA SCHEMA
// Each workout JSON follows this structure.
// Host these on GitHub and paste the raw URL.
// ══════════════════════════════════════════

      {

  {

    focus: "Quads · Hamstrings · Glutes",
    model: "Progressive Overload — Add 5–10 lbs",
    phases: [
      {
        name: "Machine Block — Load Up",
        goal: "Same machines as Week 1, but add 5–10% load. Superset leg extension with leg curl to spike intensity and save time.",

// ══════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════
let currentWorkout = null;
let setData = {};       // {exId: [{weight:'', done:false}]}
let selectedFinisher = {};  // {phaseIdx: optionIdx}
let restTimer = null;
let restTotal = 0;
let restRemaining = 0;

// ══════════════════════════════════════════
// HOME
// ══════════════════════════════════════════
function renderHome() {
  const bc = document.getElementById('builtin-cards');
  const oc = document.getElementById('other-cards');
  bc.innerHTML = BUILTIN_WORKOUTS.map(w => workoutCard(w)).join('');
  oc.innerHTML = OTHER_WORKOUTS.map(w => workoutCard(w)).join('');
}

function workoutCard(w) {
  const totalSets = countSets(w);
  return `<div class="workout-card ${w.weekClass}" onclick="startWorkout('${w.id}')">
    <div class="card-top">
      <div class="card-name">${w.name}</div>
      <div class="card-week">${w.week}</div>
    </div>
    <div class="card-meta">${w.focus}</div>
    <div class="card-stats">
      <div class="card-stat"><span>${totalSets}</span> sets</div>
      <div class="card-stat"><span>${w.duration}</span></div>
      <div class="card-stat"><span>${w.tag}</span></div>
    </div>
    <div class="card-arrow">›</div>
  </div>`;
}

function countSets(w) {
  let n = 0;
  w.phases.forEach(p => { if (p.exercises) p.exercises.forEach(e => n += e.sets); });
  return n;
}

// ══════════════════════════════════════════
// LOAD FROM URL
// ══════════════════════════════════════════
async function loadFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showToast('Paste a raw GitHub URL first'); return; }
  try {
    showToast('Loading…');
    const res = await fetch(url);
    if (!res.ok) throw new Error('Could not fetch workout');
    const data = await res.json();
    // Support single workout or array
    const workouts = Array.isArray(data) ? data : [data];
    workouts.forEach(w => {
      // Deduplicate by id
      const exists = [...BUILTIN_WORKOUTS, ...OTHER_WORKOUTS].find(x => x.id === w.id);
      if (!exists) OTHER_WORKOUTS.unshift(w);
    });
    renderHome();
    showToast('Workout loaded! ✓', false);
    document.getElementById('url-input').value = '';
  } catch(e) {
    showToast('Failed to load: ' + e.message);
  }
}

// ══════════════════════════════════════════
// START WORKOUT
// ══════════════════════════════════════════
function startWorkout(id) {
  const all = [...BUILTIN_WORKOUTS, ...OTHER_WORKOUTS];
  currentWorkout = all.find(w => w.id === id);
  if (!currentWorkout) return;

  // Init state
  setData = {};
  selectedFinisher = {};
  currentWorkout.phases.forEach((phase, pi) => {
    if (phase.exercises) {
      phase.exercises.forEach((ex, ei) => {
        const key = `${pi}-${ei}`;
        setData[key] = Array.from({length: ex.sets}, () => ({ weight: '', done: false }));
      });
    }
  });

  // Header
  document.getElementById('workout-header-title').textContent = currentWorkout.name;
  document.getElementById('workout-header-sub').textContent = `${currentWorkout.week} · ${currentWorkout.model || currentWorkout.focus}`;
  document.getElementById('workout-header-badge').textContent = currentWorkout.duration;

  renderWorkout();
  showScreen('workout');
}

// ══════════════════════════════════════════
// RENDER WORKOUT
// ══════════════════════════════════════════
function renderWorkout() {
  const body = document.getElementById('workout-body');
  let html = '';

  currentWorkout.phases.forEach((phase, pi) => {
    html += `<div class="phase-block" id="phase-${pi}">`;
    html += `<div class="phase-header">
      <div class="phase-pill ${pi === 0 ? 'active' : ''}">Phase ${pi + 1}</div>
      <div class="phase-name">${phase.name}</div>
    </div>`;

    if (phase.goal) {
      html += `<div class="phase-goal-text">${phase.goal}</div>`;
    }

    if (phase.exercises) {
      phase.exercises.forEach((ex, ei) => {
        html += renderExCard(ex, pi, ei);
      });
    }

    if (phase.finisher) {
      html += renderFinisher(phase, pi);
    }

    if (phase.cooldown) {
      html += renderCooldown(phase);
    }

    html += '</div>';
    if (pi < currentWorkout.phases.length - 1) {
      html += '<div class="phase-sep"></div>';
    }
  });

  body.innerHTML = html;
  updateProgress();
}

function renderExCard(ex, pi, ei) {
  const key = `${pi}-${ei}`;
  const sets = setData[key] || [];
  const allDone = sets.length > 0 && sets.every(s => s.done);

  let badges = '';
  if (ex.badges) {
    ex.badges.forEach(b => {
      badges += `<span class="ex-badge badge-${b.type}">${b.label}</span>`;
    });
  }

  let setsHtml = `<div class="sets-header">
    <div class="sets-header-set">SET</div>
    <div class="sets-header-target">TARGET</div>
    <div class="sets-header-weight">WEIGHT (lbs)</div>
    <div class="sets-header-done">DONE</div>
  </div>`;

  sets.forEach((s, si) => {
    setsHtml += `<div class="set-row ${s.done ? 'set-done' : ''}" id="setrow-${pi}-${ei}-${si}">
      <div class="set-num">S${si + 1}</div>
      <div class="set-target">${ex.reps}</div>
      <input class="set-weight-input" type="number" inputmode="decimal"
        placeholder="0" value="${s.weight}"
        onchange="updateWeight(${pi},${ei},${si},this.value)"
        onfocus="this.select()">
      <div class="set-done-btn">
        <button class="set-check-btn ${s.done ? 'done' : ''}"
          onclick="toggleSet(${pi},${ei},${si},${ex.rest})">
          ${s.done ? '✓' : ''}
        </button>
      </div>
    </div>`;
  });

  let tip = '';
  if (ex.tip) {
    tip = `<div class="tip-box"><b>${ex.tip.label}</b> ${ex.tip.text}</div>`;
  }

  return `<div class="ex-card ${allDone ? 'completed' : ''}" id="ex-${pi}-${ei}">
    <div class="ex-header">
      <div class="ex-name-row">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-badges">${badges}</div>
      </div>
      <div class="ex-check ${allDone ? 'done' : ''}" onclick="toggleExComplete(${pi},${ei})">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7l4 4 6-7" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="sets-area">
      ${setsHtml}
    </div>
    ${tip}
  </div>`;
}

function renderFinisher(phase, pi) {
  const sel = selectedFinisher[pi];
  let opts = phase.options.map((opt, oi) => `
    <div class="fin-opt ${sel === oi ? 'selected' : ''}" onclick="selectFinisher(${pi},${oi})">
      <div class="fin-opt-label">${opt.label}</div>
      <div class="fin-opt-name">${opt.name}</div>
      <div class="fin-opt-detail">${opt.detail}</div>
    </div>`).join('');
  return `<div class="finisher-block"><div class="finisher-opts">${opts}</div></div>`;
}

function renderCooldown(phase) {
  let cards = phase.cards.map(c => `
    <div class="cool-card">
      <div class="cool-title">${c.title}</div>
      <div class="cool-desc">${c.desc}</div>
    </div>`).join('');
  return `<div class="cooldown-block">${cards}</div>`;
}

// ══════════════════════════════════════════
// SET INTERACTIONS
// ══════════════════════════════════════════
function updateWeight(pi, ei, si, val) {
  setData[`${pi}-${ei}`][si].weight = val;
}

function toggleSet(pi, ei, si, restSecs) {
  const key = `${pi}-${ei}`;
  const set = setData[key][si];
  set.done = !set.done;

  // Update UI without full re-render
  const row = document.getElementById(`setrow-${pi}-${ei}-${si}`);
  const btn = row.querySelector('.set-check-btn');
  if (set.done) {
    row.classList.add('set-done');
    btn.classList.add('done');
    btn.textContent = '✓';
    if (restSecs > 0) startRest(restSecs, `${pi}-${ei}-${si}`);
  } else {
    row.classList.remove('set-done');
    btn.classList.remove('done');
    btn.textContent = '';
    clearRestTimer();
  }

  // Update ex card completion ring
  const sets = setData[key];
  const allDone = sets.every(s => s.done);
  const card = document.getElementById(`ex-${pi}-${ei}`);
  const check = card.querySelector('.ex-check');
  if (allDone) { card.classList.add('completed'); check.classList.add('done'); }
  else { card.classList.remove('completed'); check.classList.remove('done'); }

  updateProgress();
}

function toggleExComplete(pi, ei) {
  const key = `${pi}-${ei}`;
  const sets = setData[key];
  const allDone = sets.every(s => s.done);
  sets.forEach(s => s.done = !allDone);
  // Re-render just this card for simplicity
  const ex = currentWorkout.phases[pi].exercises[ei];
  const card = document.getElementById(`ex-${pi}-${ei}`);
  card.outerHTML = renderExCard(ex, pi, ei);
  updateProgress();
}

function selectFinisher(pi, oi) {
  selectedFinisher[pi] = oi;
  const phase = currentWorkout.phases[pi];
  const block = document.querySelector(`#phase-${pi} .finisher-block`);
  block.outerHTML = renderFinisher(phase, pi);
}

// ══════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════
function updateProgress() {
  let total = 0, done = 0;
  Object.values(setData).forEach(sets => {
    total += sets.length;
    done += sets.filter(s => s.done).length;
  });
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label-left').textContent = `${done} sets done`;
  document.getElementById('progress-label-right').textContent = `${total - done} remaining`;

  if (done === total && total > 0) {
    setTimeout(showComplete, 600);
  }
}

// ══════════════════════════════════════════
// REST TIMER
// ══════════════════════════════════════════
function startRest(secs, setId) {
  clearRestTimer();
  restTotal = secs;
  restRemaining = secs;
  const overlay = document.getElementById('rest-overlay');
  const ring = document.getElementById('rest-ring-fill');
  const timeEl = document.getElementById('rest-time');
  const nextEl = document.getElementById('rest-next');
  const circumference = 528;

  overlay.classList.remove('hidden');
  nextEl.textContent = formatRest(secs) + ' rest';

  function tick() {
    if (restRemaining <= 0) {
      skipRest();
      // Haptic if available
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      return;
    }
    const pct = restRemaining / restTotal;
    ring.style.strokeDashoffset = circumference * (1 - pct);
    timeEl.textContent = formatRest(restRemaining);
    restRemaining--;
    restTimer = setTimeout(tick, 1000);
  }
  tick();
}

function formatRest(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}:${sec.toString().padStart(2,'0')}` : `${s}`;
}

function skipRest() {
  clearRestTimer();
  document.getElementById('rest-overlay').classList.add('hidden');
}

function addRestTime(secs) {
  restRemaining += secs;
  restTotal += secs;
}

function clearRestTimer() {
  if (restTimer) { clearTimeout(restTimer); restTimer = null; }
}

// ══════════════════════════════════════════
// COMPLETE SCREEN
// ══════════════════════════════════════════
function showComplete() {
  skipRest();
  let totalSets = 0, totalWeight = 0;
  Object.entries(setData).forEach(([key, sets]) => {
    totalSets += sets.length;
    sets.forEach(s => { if (s.weight) totalWeight += parseFloat(s.weight) || 0; });
  });

  document.getElementById('complete-title').textContent = currentWorkout.name + ' Done!';
  document.getElementById('complete-sub').textContent =
    `${currentWorkout.week} · ${currentWorkout.tag} — Great work. Rest up and come back stronger.`;
  document.getElementById('complete-stats').innerHTML = `
    <div class="complete-stat">
      <div class="complete-stat-val">${totalSets}</div>
      <div class="complete-stat-label">Sets</div>
    </div>
    <div class="complete-stat">
      <div class="complete-stat-val">${Math.round(totalWeight).toLocaleString()}</div>
      <div class="complete-stat-label">lbs logged</div>
    </div>
    <div class="complete-stat">
      <div class="complete-stat-val">${currentWorkout.duration.replace(' MIN','')}</div>
      <div class="complete-stat-label">min</div>
    </div>`;
  showScreen('complete');
}

function restartWorkout() {
  startWorkout(currentWorkout.id);
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.add('hidden');
    s.classList.remove('slide-left');
  });
  document.getElementById('screen-' + name).classList.remove('hidden');
}

function goHome() {
  clearRestTimer();
  showScreen('home');
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg, isError = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--red)' : '#1a9e5c';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderHome();
</script>
